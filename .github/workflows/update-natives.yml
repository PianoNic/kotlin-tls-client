name: Check for Native Library Updates

on:
  schedule:
    - cron: '0 5 * * *'   # daily at 5:00 UTC (1h after fork builds)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/PianoNic/tls-client/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          CURRENT=$(cat natives-version.txt)
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version and open PR
        if: steps.check.outputs.update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest }}"
          BRANCH="update-natives-v$VERSION"

          git config user.name "PianoNic"
          git config user.email "79938743+PianoNic@users.noreply.github.com"

          git checkout -b "$BRANCH"
          echo "$VERSION" > natives-version.txt
          git add natives-version.txt
          git commit -m "Bump native libraries to v$VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --title "Bump native libraries to v$VERSION" \
            --body "Updates \`natives-version.txt\` to v$VERSION. Binaries are downloaded at build time from [PianoNic/tls-client releases](https://github.com/PianoNic/tls-client/releases/tag/v$VERSION)." \
            --label "enhancement"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

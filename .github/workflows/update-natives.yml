name: Check for Native Library Updates

on:
  schedule:
    - cron: '0 5 * * *'   # daily at 5:00 UTC (1h after fork builds)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          set -e
          LATEST=$(curl -s https://api.github.com/repos/PianoNic/kotlin-tls-client-natives/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          CURRENT=$(cat natives-version.txt)

          # Bail out if the API didn't give us a usable tag. Without this guard,
          # an empty/missing .tag_name comes back as the literal string "null"
          # and we'd open a branch like update-natives-vnull.
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::warning::Could not resolve latest natives release (got '$LATEST'). Skipping."
            echo "update=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version and open PR
        if: steps.check.outputs.update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest }}"
          BRANCH="update-natives-v$VERSION"

          # This job runs daily, so it keeps firing for the same version until
          # the bump lands on main. If we already opened a PR for this version
          # (open, merged, or deliberately closed), there is nothing to do.
          EXISTING=$(gh pr list --head "$BRANCH" --state all \
            --json state --jq '.[0].state // empty')
          if [ -n "$EXISTING" ]; then
            echo "A PR for $BRANCH already exists (state: $EXISTING). Nothing to do."
            exit 0
          fi

          git config user.name "PianoNic"
          git config user.email "79938743+PianoNic@users.noreply.github.com"

          git checkout -b "$BRANCH"
          echo "$VERSION" > natives-version.txt
          git add natives-version.txt
          git commit -m "Bump native libraries to v$VERSION"
          # Force-push in case a stale branch from an earlier run (one that
          # never got a PR) is still on the remote; a plain push would be
          # rejected as a non-fast-forward and fail the whole job.
          git push --force origin "$BRANCH"

          gh pr create \
            --title "Bump native libraries to v$VERSION" \
            --body "Updates \`natives-version.txt\` to v$VERSION. Binaries are downloaded at build time from [PianoNic/kotlin-tls-client-natives releases](https://github.com/PianoNic/kotlin-tls-client-natives/releases/tag/v$VERSION)." \
            --label "enhancement"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

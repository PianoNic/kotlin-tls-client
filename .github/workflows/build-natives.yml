name: Build macOS Native Libraries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Download Go lib and build JNI bridge
        run: |
          VERSION=1.14.0
          mkdir -p src/main/resources/dev/kotlintls/natives/macos-arm64
          curl -fL -o src/main/resources/dev/kotlintls/natives/macos-arm64/libtls_client_go.dylib \
            "https://github.com/bogdanfinn/tls-client/releases/download/v$VERSION/tls-client-darwin-arm64-$VERSION.dylib"
          clang -dynamiclib \
            -o src/main/resources/dev/kotlintls/natives/macos-arm64/libtls_client_jni.dylib \
            jni/tls_client_jni.c \
            -I$JAVA_HOME/include -I$JAVA_HOME/include/darwin
      - uses: actions/upload-artifact@v4
        with: { name: macos-arm64, path: src/main/resources/dev/kotlintls/natives/macos-arm64/ }

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Download Go lib and build JNI bridge
        run: |
          VERSION=1.14.0
          mkdir -p src/main/resources/dev/kotlintls/natives/macos-x86_64
          curl -fL -o src/main/resources/dev/kotlintls/natives/macos-x86_64/libtls_client_go.dylib \
            "https://github.com/bogdanfinn/tls-client/releases/download/v$VERSION/tls-client-darwin-amd64-$VERSION.dylib"
          clang -dynamiclib \
            -o src/main/resources/dev/kotlintls/natives/macos-x86_64/libtls_client_jni.dylib \
            jni/tls_client_jni.c \
            -I$JAVA_HOME/include -I$JAVA_HOME/include/darwin
      - uses: actions/upload-artifact@v4
        with: { name: macos-x86_64, path: src/main/resources/dev/kotlintls/natives/macos-x86_64/ }

  commit:
    needs: [build-macos-arm64, build-macos-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: macos-arm64,  path: src/main/resources/dev/kotlintls/natives/macos-arm64 }
      - uses: actions/download-artifact@v4
        with: { name: macos-x86_64, path: src/main/resources/dev/kotlintls/natives/macos-x86_64 }
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/dev/kotlintls/natives/
          git diff --staged --quiet || git commit -m "Add macOS native libraries [skip ci]"
          git push

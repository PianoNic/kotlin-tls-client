name: Build Native Libraries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Build
        run: |
          git clone --depth=1 https://github.com/bogdanfinn/tls-client.git /tmp/tls-client
          cd /tmp/tls-client/cffi_dist
          CGO_ENABLED=1 go build -buildmode=c-shared -o libtls_client_go.so .
          mkdir -p $GITHUB_WORKSPACE/out
          cp libtls_client_go.so $GITHUB_WORKSPACE/out/
          gcc -shared -fPIC \
            -o $GITHUB_WORKSPACE/out/libtls_client_jni.so \
            $GITHUB_WORKSPACE/jni/tls_client_jni.c \
            -I$JAVA_HOME/include -I$JAVA_HOME/include/linux \
            -ldl
      - uses: actions/upload-artifact@v4
        with: { name: linux-x86_64, path: out/ }

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Install cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: |
          git clone --depth=1 https://github.com/bogdanfinn/tls-client.git /tmp/tls-client
          cd /tmp/tls-client/cffi_dist
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            go build -buildmode=c-shared -o libtls_client_go.so .
          mkdir -p $GITHUB_WORKSPACE/out
          cp libtls_client_go.so $GITHUB_WORKSPACE/out/
          aarch64-linux-gnu-gcc -shared -fPIC \
            -o $GITHUB_WORKSPACE/out/libtls_client_jni.so \
            $GITHUB_WORKSPACE/jni/tls_client_jni.c \
            -I$JAVA_HOME/include -I$JAVA_HOME/include/linux \
            -ldl
      - uses: actions/upload-artifact@v4
        with: { name: linux-aarch64, path: out/ }

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Build
        run: |
          git clone --depth=1 https://github.com/bogdanfinn/tls-client.git /tmp/tls-client
          cd /tmp/tls-client/cffi_dist
          CGO_ENABLED=1 go build -buildmode=c-shared -o libtls_client_go.dylib .
          mkdir -p $GITHUB_WORKSPACE/out
          cp libtls_client_go.dylib $GITHUB_WORKSPACE/out/
          clang -dynamiclib \
            -o $GITHUB_WORKSPACE/out/libtls_client_jni.dylib \
            $GITHUB_WORKSPACE/jni/tls_client_jni.c \
            -I$JAVA_HOME/include -I$JAVA_HOME/include/darwin
      - uses: actions/upload-artifact@v4
        with: { name: macos-arm64, path: out/ }

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Build
        run: |
          git clone --depth=1 https://github.com/bogdanfinn/tls-client.git /tmp/tls-client
          cd /tmp/tls-client/cffi_dist
          CGO_ENABLED=1 go build -buildmode=c-shared -o libtls_client_go.dylib .
          mkdir -p $GITHUB_WORKSPACE/out
          cp libtls_client_go.dylib $GITHUB_WORKSPACE/out/
          clang -dynamiclib \
            -o $GITHUB_WORKSPACE/out/libtls_client_jni.dylib \
            $GITHUB_WORKSPACE/jni/tls_client_jni.c \
            -I$JAVA_HOME/include -I$JAVA_HOME/include/darwin
      - uses: actions/upload-artifact@v4
        with: { name: macos-x86_64, path: out/ }

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Add MinGW to PATH
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
      - name: Build
        shell: bash
        run: |
          git clone --depth=1 https://github.com/bogdanfinn/tls-client.git /tmp/tls-client
          cd /tmp/tls-client/cffi_dist
          CGO_ENABLED=1 CC=gcc GOOS=windows GOARCH=amd64 \
            go build -buildmode=c-shared -o tls_client_go.dll .
          mkdir -p "$GITHUB_WORKSPACE/out"
          cp tls_client_go.dll "$GITHUB_WORKSPACE/out/"
          JAVA_INCLUDE=$(cygpath -u "$JAVA_HOME")/include
          gcc -shared \
            -o "$GITHUB_WORKSPACE/out/tls_client_jni.dll" \
            "$GITHUB_WORKSPACE/jni/tls_client_jni.c" \
            -I"$JAVA_INCLUDE" -I"$JAVA_INCLUDE/win32"
      - uses: actions/upload-artifact@v4
        with: { name: windows-x86_64, path: out/ }

  commit:
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
      - build-macos-arm64
      - build-macos-x86_64
      - build-windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: linux-x86_64,   path: src/main/resources/dev/kotlintls/natives/linux-x86_64 }
      - uses: actions/download-artifact@v4
        with: { name: linux-aarch64,  path: src/main/resources/dev/kotlintls/natives/linux-aarch64 }
      - uses: actions/download-artifact@v4
        with: { name: macos-arm64,    path: src/main/resources/dev/kotlintls/natives/macos-arm64 }
      - uses: actions/download-artifact@v4
        with: { name: macos-x86_64,   path: src/main/resources/dev/kotlintls/natives/macos-x86_64 }
      - uses: actions/download-artifact@v4
        with: { name: windows-x86_64, path: src/main/resources/dev/kotlintls/natives/windows-x86_64 }

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/dev/kotlintls/natives/
          git diff --staged --quiet || git commit -m "Build native libraries for all platforms [skip ci]"
          git push

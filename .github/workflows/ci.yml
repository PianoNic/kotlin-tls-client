name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  build:
    runs-on: ubuntu-latest
    # Self-hosted go-httpbin so the HTTP tests don't depend on httpbin.org's
    # uptime (it returns 503 often and reddened CI). go-httpbin is an
    # API-compatible port of httpbin.
    services:
      httpbin:
        image: ghcr.io/mccutchen/go-httpbin:2.23.1
        ports:
          - 8080:8080
    env:
      HTTPBIN_BASE_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Compile
        run: ./gradlew assemble -PreleaseVersion="${{ steps.version.outputs.VERSION }}" -x test

      - name: Run tests
        run: ./gradlew test --info -PreleaseVersion="${{ steps.version.outputs.VERSION }}"

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'build/test-results/test/*.xml'
          check_name: 'Test report'
          detailed_summary: true
          include_passed: true

      - name: Upload test report HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          if-no-files-found: ignore
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: build/libs/*.jar
          retention-days: 7

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jar
          path: build/libs/

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for JAR in build/libs/*.jar; do
            [[ "$JAR" == *-sources.jar ]] && continue
            gh release upload "${{ github.event.release.tag_name }}" "$JAR" \
              --repo "${{ github.repository }}"
          done
